
services:
  # ─────────── INFRASTRUCTURE ───────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hqs-postgres
    environment:
      POSTGRES_DB: hoaquason
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migration/postgres:/docker-entrypoint-initdb.d
    networks:
      - hoaquason_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5



  mongodb:
    image: mongo:7
    container_name: hqs-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hoaquason_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hqs-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hoaquason_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hqs-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hoaquason_network

  minio:
    image: minio/minio:latest
    container_name: hqs-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - hoaquason_network

  mediamtx:
    build:
      context: ./vendor/mediamtx
      dockerfile: Dockerfile
    container_name: hqs-mediamtx
    ports:
      - "8889:8889"      # WHIP/WHEP TCP
      - "8189:8189/udp"  # WebRTC UDP (ICE)
      - "8888:8888"      # HLS
      - "8554:8554"      # RTSP
      - "9997:9997"      # API
    volumes:
      - ./vendor/mediamtx/mediamtx.yml:/mediamtx.yml
    networks:
      - hoaquason_network

  # ─────────── APPLICATION SERVICES ───────────
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: hqs-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002,https://haquason.uk,https://www.haquason.uk,https://api.haquason.uk"
      SPRING_URL: http://spring-service:8080
      FASTAPI_URL: http://fastapi-service:8000
      MEDIAMTX_API: http://mediamtx:9997
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
    depends_on:
      spring-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hoaquason_network

  spring-service:
    build:
      context: ./Ecommerce
      dockerfile: Dockerfile
    container_name: hqs-spring
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hoaquason
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/hoaquason
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@hoaquason.com}
      JWT_SECRET: ${JWT_SECRET}
      GHN_TOKEN: ${GHN_TOKEN:-}
      GHN_SHOP_ID: ${GHN_SHOP_ID:-}
      GHN_BASE_URL: ${GHN_BASE_URL:-https://dev-online-gateway.ghn.vn/shiip/public-api}
      GHN_DEFAULT_FROM_DISTRICT_ID: ${GHN_DEFAULT_FROM_DISTRICT_ID:-1542}
      GHN_DEFAULT_FROM_WARD_CODE: ${GHN_DEFAULT_FROM_WARD_CODE:-21012}
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-hoaquason}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - spring_uploads:/app/uploads
    networks:
      - hoaquason_network

  fastapi-service:
    build:
      context: ./services/fastapi-service
      dockerfile: Dockerfile
    container_name: hqs-fastapi
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MONGO_URL: mongodb://mongodb:27017/hoaquason
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      SPRING_SERVICE_URL: http://spring-service:8080
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: hoaquason-ai
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./README.md:/README.md:ro
      - ./services/fastapi-service/data:/app/data
    networks:
      - hoaquason_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.haquason.uk
        NEXT_PUBLIC_HLS_URL: https://hls.haquason.uk
        NEXT_PUBLIC_WS_URL: https://api.haquason.uk
        NEXT_PUBLIC_WHIP_URL: https://stream.haquason.uk
    container_name: hqs-frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3003
      NEXT_PUBLIC_HLS_URL: http://localhost:8888
      NEXT_PUBLIC_WS_URL: http://localhost:3000
      INTERNAL_API_URL: http://gateway:3003
      NEXT_PUBLIC_WHIP_URL: http://localhost:8889
      NEXT_PUBLIC_API_URL: https://api.haquason.uk
      NEXT_PUBLIC_HLS_URL: https://hls.haquason.uk
      NEXT_PUBLIC_WS_URL: https://api.haquason.uk
      INTERNAL_API_URL: http://gateway:3000
      NEXT_PUBLIC_WHIP_URL: https://stream.haquason.uk
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - hoaquason_network

volumes:
  postgres_data:

  mongo_data:
  redis_data:
  qdrant_data:
  minio_data:
  spring_uploads:

networks:
  hoaquason_network:
    driver: bridge
