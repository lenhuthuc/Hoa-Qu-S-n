
services:
  # ─────────── INFRASTRUCTURE ───────────
  postgres:
    image: postgres:16-alpine
    container_name: hqs-postgres
    environment:
      POSTGRES_DB: hoaquason
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hoaquason_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: hqs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-27022006Kk!}
      MYSQL_DATABASE: ecommerce
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hoaquason_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: hqs-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hoaquason_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hqs-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hoaquason_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hqs-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hoaquason_network

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: hqs-mediamtx
    ports:
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC HTTP (WHIP/WHEP)
      - "8189:8189/udp" # WebRTC ICE/UDP
      - "9997:9997"   # HTTP API
    volumes:
      - ./vendor/mediamtx/mediamtx.yml:/mediamtx.yml
    networks:
      - hoaquason_network

  # ─────────── APPLICATION SERVICES ───────────
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: hqs-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-hoaquason_jwt_secret_key_2026_stable!}
      SPRING_URL: http://spring-service:8080
      FASTAPI_URL: http://fastapi-service:8000
      MEDIAMTX_API: http://mediamtx:9997
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hoaquason_network

  spring-service:
    build:
      context: ./Ecommerce
      dockerfile: Dockerfile
    container_name: hqs-spring
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ecommerce?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-27022006Kk!}
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/hoaquason
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@hoaquason.com}
      JWT_SECRET: ${JWT_SECRET:-hoaquason_jwt_secret_key_2026_stable!}
      GHN_TOKEN: ${GHN_TOKEN:-}
      GHN_SHOP_ID: ${GHN_SHOP_ID:-}
      GHN_BASE_URL: ${GHN_BASE_URL:-https://dev-online-gateway.ghn.vn/shiip/public-api}
      GHN_DEFAULT_FROM_DISTRICT_ID: ${GHN_DEFAULT_FROM_DISTRICT_ID:-1542}
      GHN_DEFAULT_FROM_WARD_CODE: ${GHN_DEFAULT_FROM_WARD_CODE:-21012}
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-hoaquason}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - spring_uploads:/app/uploads
    networks:
      - hoaquason_network

  fastapi-service:
    build:
      context: ./services/fastapi-service
      dockerfile: Dockerfile
    container_name: hqs-fastapi
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MONGO_URL: mongodb://mongodb:27017/hoaquason
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      SPRING_SERVICE_URL: http://spring-service:8080
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - hoaquason_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hqs-frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_HLS_URL: http://localhost:8888
      NEXT_PUBLIC_WS_URL: http://localhost:3000
      INTERNAL_API_URL: http://gateway:3000
    depends_on:
      - gateway
    networks:
      - hoaquason_network

volumes:
  postgres_data:
  mysql_data:
  mongo_data:
  redis_data:
  qdrant_data:
  spring_uploads:

networks:
  hoaquason_network:
    driver: bridge
