# ══════════════════════════════════════════════════════════════
# MediaMTX Configuration — Hoa Quả Sơn Livestream Platform
# ══════════════════════════════════════════════════════════════

# ─── Global Settings ───
logLevel: info
logDestinations: [stdout]
authInternalUsers:
  - user: internal
    pass: internal
    permissions:
      - action: publish
        path:
      - action: read
        path:

# ─── HTTP API ───
api: yes
apiAddress: :9997

# ─── Protocols ───
rtmp: yes
rtmpAddress: :1935

rtsp: yes
rtspAddress: :8554

hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsSegmentCount: 7
hlsSegmentDuration: 2s
hlsPartDuration: 500ms
hlsSegmentMaxSize: 50M
hlsAllowOrigins: ["*"]
hlsVariant: lowLatency

webrtc: yes
webrtcAddress: :8889
webrtcAdditionalHosts: [127.0.0.1, 192.168.1.8]
webrtcLocalUDPAddress: :8189
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

authMethod: http
authHTTPAddress: http://gateway:3000/api/livestream/auth/publish

pathDefaults:
  record: no

# ══════════════════════════════════════════════════════════════
# PATHS — Quản lý luồng video & Transcoding
# ══════════════════════════════════════════════════════════════
paths:
  "~^live-[0-9]+-[0-9a-f]{8}$":
    runOnReady: >
      ffmpeg
      -hide_banner
      -loglevel warning
      -rtsp_transport tcp
      -i rtsp://127.0.0.1:8554/$MTX_PATH
      -map 0:v:0 -map 0:a:0
      -c:v copy
      -c:a aac -b:a 128k -ar 48000 -ac 2
      -af "aresample=async=1"
      -f rtsp -rtsp_transport tcp
      rtsp://127.0.0.1:8554/${MTX_PATH}-aac
    runOnReadyRestart: yes

  "~^live-[0-9]+-[0-9a-f]{8}-aac$":
    runOnReady: ""